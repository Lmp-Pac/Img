<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: transparent;
    }
    .container {
      width: 100%;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
    }
  </style>
</head>
<body>
  <div class="container">
    <img id="img" src="">
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const imgUrl = params.get("img");

    if (imgUrl) {
      document.getElementById("img").src = imgUrl;
    } else {
      document.body.innerHTML = "Aucune image fournie";
    }
  </script>
</body>
</html>
